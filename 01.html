"<!DOCTYPE html>
<html lang=""ko"">
<head>
<meta charset=""utf-8"">
<meta name=""viewport"" content=""width=device-width, initial-scale=1"">
<title>2호선 용산역 영남대 방면 음료 자판기 안내</title>

<style>
body {
  font-size: 18px;
  line-height: 1.5;
  padding: 12px;
  margin: 0;
  word-break: keep-all;
}

h2 {
  font-size: 22px;
  margin: 0 0 8px 0;
}

.info {
  font-size: 16px;
  color: #333;
  margin: 0 0 12px 0;
}

p {
  margin: 6px 0;
}

hr {
  border: none;
  border-top: 1px solid #ddd;
  margin: 16px 0;
}

.btn {
  display: block;
  width: 100%;
  height: 60px;
  line-height: 60px;
  margin: 14px 0;
  font-size: 16px;
  font-weight: bold;
  border: none;
  border-radius: 8px;
  background-color: #333;
  color: #fff;
  text-align: center;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  cursor: pointer;
}

.num,
.name,
.type {
  display: inline;
}

.num {
  font-weight: bold;
  background: #f2f2f2;
  padding: 2px 6px;
  border-radius: 4px;
  margin-right: 6px;
}

.logo-wrap {
  text-align: center;
  margin-top: 24px;
}

.logo-wrap img {
  max-width: 140px;
}

.logo-text {
  margin-top: 8px;
  font-size: 14px;
  color: #555;
}

/* 확대 모드 */
.large-text {
  font-size: 36px;
  font-weight: bold;
  line-height: 1.8;
}

.large-text h2 {
  font-size: 40px;
  line-height: 1.3;
  text-align: center;
}

.large-text .info {
  font-size: 28px;
}

.large-text p {
  margin: 12px 0;
}

.large-text .btn {
  height: 90px;
  line-height: 90px;
  font-size: 28px;
}

.large-text .num,
.large-text .name,
.large-text .type {
  display: block;
}

.large-text .num {
  margin-bottom: 4px;
}

.large-text .name {
  margin-bottom: 4px;
}
</style>

<script>
function toggleLargeText() {
  document.body.classList.toggle(""large-text"");

  const button = document.getElementById(""toggleButton"");
  if (document.body.classList.contains(""large-text"")) {
    button.textContent = ""기본 크기로 보려면 터치하세요"";
  } else {
    button.textContent = ""확대해서 보려면 터치하세요"";
  }
}
</script>
</head>

<body>

<h2>2호선 용산역 영남대 방면 음료 자판기</h2>

<p class=""info""><strong>자판기 위치</strong>: 영남대 방면 6-3 앞</p>

<button id=""toggleButton"" class=""btn"" onclick=""toggleLargeText()"">
확대해서 보려면 터치하세요
</button>

<hr>

<p aria-label=""1열 1번 위치, 데미소다 애플, 캔 900원"">
  <span class=""num"">1열 1번</span>
  <span class=""name"">데미소다 애플</span>
  <span class=""type"">캔 900원</span>
</p>

<p aria-label=""1열 2번 위치, 데미소다 복숭아, 캔 900원"">
  <span class=""num"">1열 2번</span>
  <span class=""name"">데미소다 복숭아</span>
  <span class=""type"">캔 900원</span>
</p>

<p aria-label=""1열 3번 위치, 데미소다 레몬, 캔 900원"">
  <span class=""num"">1열 3번</span>
  <span class=""name"">데미소다 레몬</span>
  <span class=""type"">캔 900원</span>
</p>

<hr>

<a href=""https://naver.me/xB7DoOjr"" class=""btn"">오류 제보하기</a>

<div class=""logo-wrap"">
  <img src=""dudat-logo.png"" alt=""두다닷 로고"">
  <div class=""logo-text"">
    제작: 두다닷<br>
    문의: dodadot@naver.com
  </div>
</div>

</body>
</html>"
